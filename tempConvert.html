<script>

function promptBox() {
let tempF = prompt("Please enter a temperature in farenheit");
 if (tempF == null || tempF == "") {
    text = "NaN";
  } else {
    text = Math.round(toCelsius(tempF));
  }
  document.getElementById("demo").innerHTML = text;

function toCelsius(f) {
  return (5/9) * (f-32);
}

}
